kind = "web"
previewPath = "/"
title = "Trading Academy"
version = "1.0.0"
id = "artifacts/trading-academy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21134

[services.development]
run = "pnpm --filter @workspace/trading-academy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trading-academy", "run", "build" ]
publicDir = "artifacts/trading-academy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21134"
BASE_PATH = "/"
